name: Mimer
options:
  bundleIdPrefix: com.hasanjafri
  deploymentTarget:
    macOS: "14.0"
  createIntermediateGroups: true
  groupSortPosition: top

settings:
  base:
    # Swift 6 toolchain, Swift 5 language mode for the scaffold.
    # Migrate to Swift 6 language mode in Phase 1 with the concurrency-sensitive monitor.
    SWIFT_VERSION: "5.0"
    MARKETING_VERSION: "0.2.1"
    CURRENT_PROJECT_VERSION: "1"   # local-dev placeholder; releases set CFBundleVersion to the git commit count (see scripts/release.sh)
    DEVELOPMENT_TEAM: ""              # set when configuring Developer ID signing
    CODE_SIGN_STYLE: Automatic
    ENABLE_HARDENED_RUNTIME: YES      # required for notarized direct distribution

packages:
  # Pinned to exact versions (not `from:` ranges) so a release can't pull a newer —
  # possibly compromised — dependency into a signed, notarized, auto-updated build.
  # Bump these deliberately and re-verify.
  KeyboardShortcuts:
    url: https://github.com/sindresorhus/KeyboardShortcuts
    exactVersion: "2.4.0"
  Sparkle:
    url: https://github.com/sparkle-project/Sparkle
    exactVersion: "2.9.3"

targets:
  Mimer:
    type: application
    platform: macOS
    sources:
      - path: Sources/Mimer
    dependencies:
      - package: KeyboardShortcuts
      - package: Sparkle
    info:
      path: Sources/Mimer/Info.plist
      properties:
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        LSUIElement: true                       # menu-bar agent, no Dock icon
        NSHumanReadableCopyright: "Mimer — MIT-licensed."
        SUFeedURL: https://raw.githubusercontent.com/hasanjafri/Mimer/main/appcast.xml
        SUPublicEDKey: szbZAEoKZV3tF8/RllVeBtnZHgBs/D4gpRIjFftjC6k=
        SUEnableAutomaticChecks: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.hasanjafri.Mimer
        PRODUCT_NAME: Mimer
        COMBINE_HIDPI_IMAGES: YES
        CODE_SIGN_ENTITLEMENTS: Mimer.entitlements   # hardened runtime; sandbox explicitly off
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon

  MimerTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: Tests/MimerTests
    dependencies:
      - target: Mimer
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.hasanjafri.MimerTests
        GENERATE_INFOPLIST_FILE: YES

schemes:
  Mimer:
    build:
      targets:
        Mimer: all
        MimerTests: [test]
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - MimerTests
